repos:
    - repo: https://github.com/oxc-project/mirrors-oxlint
      rev: v1.60.0
      hooks:
          - id: oxlint
            name: oxlint
            pass_filenames: false

    - repo: https://github.com/oxc-project/mirrors-oxfmt
      rev: v0.45.0
      hooks:
          - id: oxfmt

    - repo: local
      hooks:
          - id: bun-test
            name: bun test
            entry: bun test
            language: system
            pass_filenames: false
            stages: [pre-push]
