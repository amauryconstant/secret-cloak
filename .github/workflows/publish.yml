name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - run: bun test

  build:
    needs: test
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - run: bun install

      - run: bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-slim
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - run: npm publish
